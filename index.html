<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projecteur Pro v2.1 | Système Optique Intégré</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#080808] text-zinc-400 font-sans select-none overflow-hidden poppins-font">

    <div id="boot-screen" class="fixed inset-0 bg-black z-[200] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative h-20 w-20 flex items-center justify-center">
            <i class="fas fa-projector text-5xl text-cyan-500 animate-pulse"></i>
            <div class="absolute inset-0 rounded-full border-4 border-cyan-900 border-t-cyan-500 animate-spin"></div>
        </div>
        <p class="mt-8 font-mono text-[9px] tracking-[0.5em] text-cyan-900 uppercase">PROJECTEUR_PRO_OS v2.1</p>
    </div>

    <main class="relative w-full h-screen flex items-center justify-center p-6 pb-60 overflow-hidden">
        <div id="projection-wall" class="relative w-full max-w-5xl aspect-video bg-black rounded-3xl shadow-[0_0_90px_rgba(0,0,0,1)] border border-zinc-900 overflow-hidden transition-all duration-150 transform-style-3d">
            
            <video id="video-feed" autoplay playsinline muted loop class="absolute inset-0 w-full h-full object-contain grayscale-[0.1] contrast-[1.1]"></video>
            <img id="image-feed" class="absolute inset-0 w-full h-full object-contain hidden">
            
            <div id="calibration-grid" class="absolute inset-0 grid grid-cols-6 grid-rows-4 border border-cyan-950 opacity-10 pointer-events-none">
                </div>
            
            <div class="absolute top-4 right-4 flex items-center gap-2 px-3 py-1.5 rounded-full bg-black/80 border border-zinc-800">
                <div id="source-icon" class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
                <span id="source-text" class="text-[9px] font-bold text-green-500 uppercase tracking-widest">Live Cam</span>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-[#111] border-t border-zinc-900 p-6 rounded-t-[40px] shadow-[0_-15px_50px_rgba(0,0,0,0.8)] z-50">
        <div class="max-w-md mx-auto space-y-6">
            
            <div class="flex justify-between items-center border-b border-zinc-900 pb-5">
                <h2 class="text-xs font-black text-white uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-photo-video text-cyan-500"></i> Source Média
                </h2>
                
                <div class="flex items-center gap-2">
                    <label for="gallery-input" class="text-[10px] font-bold text-cyan-500 bg-cyan-500/10 px-4 py-2 rounded-full border border-cyan-500/20 cursor-pointer hover:bg-cyan-500/20 transition">
                        <i class="fas fa-images mr-1.5"></i> GALERIE
                    </label>
                    <input type="file" id="gallery-input" accept="image/*,video/*" class="hidden">
                    
                    <button onclick="startLiveCamera()" class="text-[10px] font-bold text-zinc-500 bg-zinc-800 px-4 py-2 rounded-full border border-zinc-700 transition active:scale-95">
                        <i class="fas fa-camera mr-1.5"></i> LIVE
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-x-6 gap-y-5 text-[10px] font-bold text-zinc-500 uppercase tracking-wider">
                
                <div>
                    <label class="flex justify-between mb-2">Mise au point <span id="v-focus" class="text-cyan-500">Net</span></label>
                    <input type="range" id="focus" min="0" max="15" value="0" step="0.1" class="w-full accent-cyan-500 cursor-pointer">
                </div>

                <div>
                    <label class="flex justify-between mb-2">Luminosité <span id="v-bright" class="text-cyan-500">100%</span></label>
                    <input type="range" id="brightness" min="40" max="160" value="100" class="w-full accent-cyan-500 cursor-pointer">
                </div>

                <div class="col-span-2">
                    <label class="flex justify-between mb-2"><i class="fas fa-vector-square mr-2 text-orange-500"></i> Correction Keystone (3D) <span id="v-key" class="text-orange-400">0°</span></label>
                    <input type="range" id="keystone" min="-20" max="20" value="0" step="0.5" class="w-full accent-orange-500 cursor-pointer">
                </div>
            </div>
            
            <button onclick="resetOptics()" class="w-full text-center text-[9px] font-bold text-zinc-700 uppercase tracking-widest mt-1 hover:text-white transition">Réinitialiser le bloc optique</button>
        </div>
    </footer>

    <script>
        const video = document.getElementById('video-feed');
        const image = document.getElementById('image-feed');
        const wall = document.getElementById('projection-wall');
        const galleryInput = document.getElementById('gallery-input');
        
        const focusInput = document.getElementById('focus');
        const brightInput = document.getElementById('brightness');
        const keystoneInput = document.getElementById('keystone');

        // Écran de boot et Initialisation
        window.onload = () => {
            setTimeout(() => { document.getElementById('boot-screen').style.opacity = '0'; 
            setTimeout(() => document.getElementById('boot-screen').remove(), 1000); }, 2000);
            generateGrid();
            startLiveCamera(); // Démarre sur la caméra par défaut
        };

        // Mire de calibration
        function generateGrid() {
            const grid = document.getElementById('calibration-grid');
            for (let i = 0; i < 24; i++) {
                const cell = document.createElement('div');
                cell.className = "border border-cyan-950/50 flex items-center justify-center text-[9px] text-cyan-950 font-mono";
                cell.innerText = String.fromCharCode(65 + Math.floor(i/6)) + ((i%6)+1);
                grid.appendChild(cell);
            }
        }

        // --- GESTION DE LA GALERIE (Liaison Directe) ---
        galleryInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Création d'une URL locale ultra-rapide (zéro latence)
            const mediaUrl = URL.createObjectURL(file);
            
            // Détection automatique du type de média
            if (file.type.startsWith('video/')) {
                // Mode Vidéo
                image.classList.add('hidden');
                video.classList.remove('hidden');
                
                // Libérer la caméra si elle tourne
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                }
                
                video.src = mediaUrl;
                video.play();
                updateSourceIndicator("Galerie Vidéo", "text-orange-500", "bg-orange-500");
            } else if (file.type.startsWith('image/')) {
                // Mode Image
                video.classList.add('hidden');
                image.classList.remove('hidden');
                
                // Arrêter la caméra si nécessaire
                if (video.srcObject) { video.srcObject.getTracks().forEach(track => track.stop()); }
                
                image.src = mediaUrl;
                updateSourceIndicator("Galerie Image", "text-orange-500", "bg-orange-500");
            }
            resetOptics(); // Remet les optiques à zéro pour le nouveau média
        });

        // --- GESTION DE LA CAMÉRA LIVE ---
        async function startLiveCamera() {
            image.classList.add('hidden');
            video.classList.remove('hidden');
            
            // Nettoyer la source vidéo précédente (galerie)
            if (video.src) { video.src = ""; URL.revokeObjectURL(video.src); }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                updateSourceIndicator("Live Cam", "text-green-500", "bg-green-500");
            } catch (err) {
                console.error("Accès caméra impossible", err);
                alert("ERREUR: Impossible d'accéder à la caméra.");
            }
        }

        // Indicateur de source
        function updateSourceIndicator(text, colorClass, bgClass) {
            const txt = document.getElementById('source-text');
            const icon = document.getElementById('source-icon');
            txt.innerText = text;
            txt.className = `text-[9px] font-bold ${colorClass} uppercase tracking-widest`;
            icon.className = `h-2 w-2 rounded-full ${bgClass} animate-pulse`;
        }

        // --- MOTEUR OPTIQUE ACTIF ---
        function updateOptics() {
            const f = focusInput.value;
            const b = brightInput.value;
            const k = keystoneInput.value;

            // Applique les filtres (Blur et Brightness)
            const filterStr = `blur(${f}px) brightness(${b}%)`;
            video.style.filter = filterStr;
            image.style.filter = filterStr;

            // Transformation 3D Keystone (Perspective + Rotation + Compensation Skew)
            // will-change: transform dans le CSS assure la fluidité GPU
            const perspective = 1200; // Profondeur virtuelle constante
            const skewY = k / 5; // Compensation latérale pour un trapèze parfait
            wall.style.transform = `perspective(${perspective}px) rotateX(${k}deg) skewY(${skewY}deg)`;

            // Mise à jour des labels numériques
            document.getElementById('v-focus').innerText = f == 0 ? "Net" : f;
            document.getElementById('v-bright').innerText = b + "%";
            document.getElementById('v-key').innerText = k + "°";
        }

        // Écouteurs d'événements analogiques
        [focusInput, brightInput, keystoneInput].forEach(id => {
            id.addEventListener('input', updateOptics);
        });

        // Réinitialisation Optique
        function resetOptics() {
            focusInput.value = 0;
            brightInput.value = 100;
            keystoneInput.value = 0;
            updateOptics();
        }

        // Activation du Service Worker pour le mode Hors-ligne
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    </script>
</body>
</html>
